<div class="modal-overlay" (click)="close.emit()">
  <div class="modal-container" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>{{ employee?.id ? 'Edit Employee' : 'Add New Employee' }}</h3>
      <button class="close-btn" (click)="close.emit()">✕</button>
    </div>
    
    <div class="modal-body">
      <div class="form-group">
        <label>Full Name *</label>
        <input 
          type="text" 
          [(ngModel)]="formData.name" 
          class="form-control" 
          placeholder="Enter full name"
          required>
      </div>
      
      <div class="form-group">
        <label>Email Address *</label>
        <input 
          type="email" 
          [(ngModel)]="formData.email" 
          class="form-control" 
          placeholder="Enter email"
          required>
      </div>
      
      <div class="form-group">
        <label>Department *</label>
        <select [(ngModel)]="formData.department" class="form-control" required>
          <option value="">Select Department</option>
          <option value="IT">IT</option>
          <option value="HR">HR</option>
          <option value="Finance">Finance</option>
          <option value="Marketing">Marketing</option>
          <option value="Sales">Sales</option>
          <option value="Operations">Operations</option>
        </select>
      </div>
      
      <div class="form-group">
        <label>Salary *</label>
        <input 
          type="number" 
          [(ngModel)]="formData.sal" 
          class="form-control" 
          placeholder="Enter salary"
          min="0"
          step="1000"
          required>
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn-cancel" (click)="close.emit()">Cancel</button>
      <button class="btn-save" (click)="save()">Save Employee</button>
    </div>
  </div>
</div>
