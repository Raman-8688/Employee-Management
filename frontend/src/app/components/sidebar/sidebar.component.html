<aside class="sidebar" [class.collapsed]="isCollapsed">
  <div class="sidebar-header">
    <div class="logo">
      <mat-icon class="logo-icon">apartment</mat-icon>
      <span class="logo-text" *ngIf="!isCollapsed">MarcoHR</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li *ngFor="let item of menuItems" class="nav-item">
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-link">
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>

          <span class="nav-label" *ngIf="!isCollapsed">{{ item.label }}</span>

          <span class="badge" *ngIf="item.badge && !isCollapsed">
            {{ item.badge }}
          </span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer" *ngIf="!isCollapsed">
    <div class="user-info">
      <div class="user-avatar">SM</div>
      <div class="user-details">
        <p class="user-name">Shahid Minh</p>
        <p class="user-email">hello&#64;warexpace.com</p>
      </div>
    </div>
  </div>
</aside>
