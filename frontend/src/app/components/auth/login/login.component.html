<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">
        <mat-icon>business_center</mat-icon>
        <h2>Employee Management System</h2>
      </div>
      <p class="subtitle">Sign in to your account</p>
    </div>

    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-group">
          <mat-icon class="input-icon">account_circle</mat-icon>
          <input
            type="text"
            id="username"
            formControlName="username"
            [class.is-invalid]="submitted && f['username'].errors"
            placeholder="Enter your username"
          />
        </div>
        <div *ngIf="submitted && f['username'].errors" class="error-message">
          Username is required
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-group">
          <mat-icon class="input-icon">lock</mat-icon>
          <input
            type="password"
            id="password"
            formControlName="password"
            [class.is-invalid]="submitted && f['password'].errors"
            placeholder="Enter your password"
          />
        </div>
        <div *ngIf="submitted && f['password'].errors" class="error-message">
          <span *ngIf="f['password'].errors['required']"
            >Password is required</span
          >
          <span *ngIf="f['password'].errors['minlength']"
            >Password must be at least 6 characters</span
          >
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="isLoading">
        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>

      <div class="register-link">
        Don't have an account? <a routerLink="/register">Create an account</a>
      </div>
    </form>
  </div>
</div>
